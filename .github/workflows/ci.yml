name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-budget-and-responsive:
    name: Build · bundle budgets · responsive overflow
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bun run build
        env:
          NODE_ENV: production

      - name: Enforce bundle-size budgets
        run: node scripts/check-bundle-budget.mjs

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Responsive overflow regression
        run: bun run test:responsive
        env:
          CI: "true"

      - name: Upload bundle report (on analyze runs)
        if: always() && hashFiles('dist/bundle-report.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: bundle-report
          path: dist/bundle-report.html

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report